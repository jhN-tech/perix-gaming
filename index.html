<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>PeriX Gaming</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f0f;
      color: white;
    }

    header {
      background: #000;
      padding: 20px;
      text-align: center;
      font-size: 24px;
      color: #00f7ff;
    }

    .productos {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 40px;
      flex-wrap: wrap;
    }

    .card {
      background: #1a1a1a;
      padding: 20px;
      border-radius: 10px;
      width: 200px;
      text-align: center;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px #00f7ff;
    }

    .btn {
      background: #00f7ff;
      border: none;
      padding: 10px;
      margin-top: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    .whatsapp {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: green;
      padding: 15px;
      border-radius: 50%;
      color: white;
      font-size: 20px;
    }
  </style>
</head>

<body>

<header>
  🎮 PeriX Gaming
</header>

<section class="productos">

  <div class="card">
    <h3>Mouse Gamer</h3>
    <p>$25.999</p>
    <button class="btn">Comprar</button>
  </div>

  <div class="card">
    <h3>Teclado Kumara</h3>
    <p>$65.000</p>
    <button class="btn">Comprar</button>
  </div>

</section>

<a class="whatsapp" href="https://wa.me/549XXXXXXXXXX">💬</a>

</body>
</html>
